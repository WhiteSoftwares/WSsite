*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}
body{background:white;color:#111;min-height:100vh;display:flex;flex-direction:column;position:relative;}
#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}

.btn{display:inline-block;margin-top:10px;background:#4169E1;color:white;padding:12px 25px;border-radius:8px;text-decoration:none;}
@media(max-width:600px){.cards{flex-direction:column;}}

<!-- p5.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Partículas físicas
let particles = [];
let particleCount = 80;

function setup(){
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvas-container");
  for(let i=0;i<particleCount;i++){
    particles.push(new Particle(random(width), random(height)));
  }
}

function draw(){
  clear();
  background(255,255,255,0); // transparente
  for(let p of particles){
    p.update();
    p.edges();
  }
  for(let p of particles){
    p.connect(particles);
  }
  for(let p of particles){
    p.show();
  }
}

// Partícula
class Particle {
  constructor(x,y){
    this.pos = createVector(x,y);
    this.vel = p5.Vector.random2D().mult(random(1,2));
    this.mass = random(1,2);
    this.radius = this.mass*5;
  }
  
  update(){
    this.pos.add(this.vel);
    // colisão com outras partículas
    for(let other of particles){
      if(other!==this){
        let d = dist(this.pos.x,this.pos.y,other.pos.x,other.pos.y);
        if(d < this.radius + other.radius){
          let angle = atan2(other.pos.y-this.pos.y, other.pos.x-this.pos.x);
          let force = p5.Vector.fromAngle(angle).mult(0.5);
          this.vel.sub(force);
          other.vel.add(force);
        }
      }
    }
  }
  
  edges(){
    if(this.pos.x < this.radius || this.pos.x>width-this.radius) this.vel.x*=-1;
    if(this.pos.y < this.radius || this.pos.y>height-this.radius) this.vel.y*=-1;
  }
  
  connect(particles){
    let connections = 0;
    for(let other of particles){
      if(other!==this && connections<3){
        let d = dist(this.pos.x,this.pos.y,other.pos.x,other.pos.y);
        if(d<150){
          stroke(65,105,225,100);
          line(this.pos.x,this.pos.y,other.pos.x,other.pos.y);
          connections++;
        }
      }
    }
  }
  
  show(){
    noStroke();
    fill(65,105,225);
    ellipse(this.pos.x,this.pos.y,this.radius*2);
  }
}

function windowResized(){
  resizeCanvas(windowWidth, windowHeight);
}
</script>
